#-------------------------------
# General Site Settings
baseURL = "https://www.gardenwild.org.uk"
languageCode = "en-gb"
title = "Garden Wild Plants CIC"
# googleAnalytics = "" # Add your identifier. For example UA-99631805-1.

#-------------------------------
# Pagination settings:
[pagination]
  pagerSize = 3

[params]
  description = "Personal Portfolio Theme for HUGO"
  color_scheme = "auto" # You have the option to choose between three modes: auto, light, and dark. The default mode is set to auto, which means that the color scheme will automatically adapt based on your operating system settings. This way, you can enjoy a personalized experience without having to manually switch between light and dark modes.

#-------------------------------
# Global Cover
[params.global.cover]
  enable = true
  homepage_image = 'https://placehold.co/1920x1080' # This line allows you to add a beautiful image at the top of your site, creating an eye-catching visual element that enhances the overall appearance and appeal.

#-------------------------------
# Breadcrumbs
[params.breadcrumbs]
  enable = true # This line of code enables you to easily incorporate breadcrumbs into your website. By setting the "enable" parameter to "true", breadcrumbs will be enabled on your website, allowing users to easily track their navigation and find relevant information. Conversely, setting the parameter to "false" will disable the display of breadcrumbs, removing this navigation feature from your website.

#-------------------------------
# Main Menu
[menu]
  [[menu.main]]
    name = "🏠 Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "🚀 Projects"
    url = "/projects/"
    weight = 2

  [[menu.main]]
    name = "🎬 Videos"
    url = "/videos/"
    weight = 3

  [[menu.main]]
    name = "👨🏻‍💻 About"
    url = "/about/"
    weight = 4

  [[menu.main]]
    name = "📷 Gallery"
    url = "/gallery/"
    weight = 5

  [[menu.main]]
    name = "✍️ Blog"
    url = "/posts/"
    weight = 6

  [[menu.main]]
    name = "📔 Elements"
    url = "/elements/"
    weight = 7

  #-------------------------------
  # Author Settings
  [params.author]
    author_name = "Garden Wild Plants CIC"
    author_role = "Wildlife orchards & forest gardens"
    author_bio = "👨🏻‍💻 Geeky Web Designer ⭐️ Helping businesses create stunning online experiences 💡 Passionate about user-centered design and seamless functionality 🔥 Adobe Creative Suite expert ✨ Lover of clean code and responsive layouts 🚀 Let's turn your ideas into captivating websites!"
    author_avatar = "https://placehold.co/240x240"
    cta_button_text = "Get in touch"
    cta_button_link = "/contact/"

  #-------------------------------
  # Projects Settings
  [params.projects]
    enable = true
    projects__title= "Portfolio"
    projects__description= ""

  #-------------------------------
  # Blog Section
  [params.blog]
    enable = true
    blog__title = "Writing"
    blog__description = ""

  #-------------------------------
  # Blog Section
  [params.gallery]
    enable = true
    gallery__title = "Gallery"
    gallery__description = ""

  #-------------------------------
  # Newsletter Settings
  [params.mailchimp]
    enable = true
    mailchimp__identifier = "gmail.us21.list-manage.com/subscribe/post?u=8aeb9c31a5c97a3a5f9ff2740&amp;id=0e31fd7793&amp" # Add your MailChimp form identifier. For example - gmail.us21.list-manage.com/subscribe/post?u=8aeb9c31a5c97a3a5f9ff2740&amp;id=0e31fd7793&amp
    mailchimp__title = "Get interesting news"
    mailchimp__description = "Subscribe to our newsletter and we’ll send you the emails of latest posts."
    mailchimp__input__text = "Your email address..."
    mailchimp__button__text = "Join Me" # Add your button text

